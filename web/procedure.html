<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết thủ tục - TTHC Assistant</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>
                TTHC Assistant
            </a>
            <nav class="nav-links">
                <a href="/">Trang chủ</a>
                <a href="/search.html">Tra cứu</a>
                <a href="/admin/dashboard.html">Admin Console</a>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <div id="loading" style="text-align: center; padding: 3rem 0;">
            <div class="loader"></div>
        </div>

        <div id="content" class="hidden">
            <div class="card" style="border-top: 4px solid var(--primary-color);">
                <h1 id="proc-title" style="margin-bottom: 0.5rem; color: var(--primary-color);"></h1>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;" id="proc-badges">
                    <!-- Added by JS -->
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; background: var(--bg-color); padding: 1rem; border-radius: var(--radius-sm);">
                    <div><span style="color:var(--text-muted)">Cơ quan thực hiện:</span> <strong id="proc-agency"></strong></div>
                    <div><span style="color:var(--text-muted)">Lĩnh vực:</span> <strong id="proc-field"></strong></div>
                    <div><span style="color:var(--text-muted)">Cấp thực hiện:</span> <strong id="proc-level"></strong></div>
                    <div><span style="color:var(--text-muted)">Quyết định:</span> <strong id="proc-decision"></strong></div>
                    <div><span style="color:var(--text-muted)">Cập nhật Link DVC QG:</span> <span id="proc-url"></span></div>
                </div>

                <h3>Chi tiết các bước thực hiện</h3>
                <div id="sections-accordion">
                    <!-- Added by JS -->
                </div>
            </div>
        </div>
        
        <div id="error" class="hidden card" style="text-align:center; padding:3rem;">
           <h2 style="color: var(--danger-color)">Không tìm thấy tài liệu</h2>
           <p style="margin-bottom: 2rem" id="error-msg"></p>
           <a href="/search.html" class="btn btn-primary">Quay lại Tra cứu</a>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            const loadingHtml = document.getElementById('loading');
            const contentHtml = document.getElementById('content');
            const errorHtml = document.getElementById('error');

            if (!id) {
                loadingHtml.classList.add('hidden');
                errorHtml.classList.remove('hidden');
                document.getElementById('error-msg').textContent = "Không có mã ID được cung cấp.";
                return;
            }

            try {
                const doc = await API.getProcedure(id);
                
                document.getElementById('proc-title').textContent = doc.ten_thu_tuc;
                document.getElementById('proc-badges').innerHTML = `
                    <span class="badge badge-success">Mã: ${doc.ma_thu_tuc}</span>
                    <span class="badge" style="background:#e2e8f0;color:#334155">${doc.agency_folder}</span>
                `;
                
                document.getElementById('proc-agency').textContent = doc.flat_metadata.co_quan_thuc_hien || 'Đang cập nhật';
                document.getElementById('proc-field').textContent = doc.flat_metadata.linh_vuc || 'Đang cập nhật';
                document.getElementById('proc-level').textContent = doc.flat_metadata.cap_thuc_hien || 'Đang cập nhật';
                document.getElementById('proc-decision').textContent = doc.flat_metadata.quyet_dinh || 'Đang cập nhật';
                
                if (doc.source_url) {
                    document.getElementById('proc-url').innerHTML = `<a href="${doc.source_url}" target="_blank">Xem trên Cổng DVC Bộ ngành/QG ↗</a>`;
                } else {
                    document.getElementById('proc-url').innerHTML = `<span style="color:var(--text-muted)">Không có link</span>`;
                }

                const accordion = document.getElementById('sections-accordion');
                doc.sections.forEach(sec => {
                    const idSafe = 'sec-' + Math.random().toString(36).substr(2, 9);
                    let contentHtmlText = sec.content.replace(/\n/g, '<br>');
                    
                    const item = document.createElement('div');
                    item.className = 'accordion-item';
                    item.innerHTML = `
                        <div class="accordion-header" onclick="document.getElementById('${idSafe}').classList.toggle('open')">
                            ${sec.heading}
                            <span style="font-size:0.8em;color:var(--text-muted)">➕</span>
                        </div>
                        <div class="accordion-body" id="${idSafe}">
                            ${contentHtmlText}
                        </div>
                    `;
                    accordion.appendChild(item);
                });

                loadingHtml.classList.add('hidden');
                contentHtml.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                loadingHtml.classList.add('hidden');
                errorHtml.classList.remove('hidden');
                document.getElementById('error-msg').textContent = err.message;
            }
        });
    </script>
</body>
</html>
