<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Dashboard - Admin</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">TTHC Assistant Admin</a>
            <nav class="nav-links">
                <a href="/">Về trang chủ</a>
                <a href="/admin/dashboard.html">Dashboard</a>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <h1 style="margin-bottom: 2rem;">Benchmark & Evaluation 📊</h1>
        <div class="card">
            <h3>Danh sách Benchmark Queries</h3>
            <p style="color:var(--text-muted); margin-bottom: 1rem;">Lấy từ <code>tests/benchmark_queries.json</code>.</p>
            
            <table class="facts-table" id="bench-table">
                <thead>
                    <tr>
                        <th style="width:100px">ID</th>
                        <th style="width:120px">Category</th>
                        <th>Query</th>
                        <th style="width:150px">Target Document</th>
                        <th style="width:120px">Expected Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            
            <div id="loading" style="text-align:center"><div class="loader"></div></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch("/api/benchmark");
                const data = await res.json();
                const tbody = document.getElementById('bench-table').querySelector('tbody');
                
                data.queries.forEach(q => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${q.id}</strong></td>
                        <td><span class="badge" style="background:#e2e8f0;color:#334155">${q.category}</span></td>
                        <td>${q.query}</td>
                        <td>${q.expected_ma_thu_tuc || '<i>N/A</i>'}</td>
                        <td>
                            <span class="badge ${q.expected_status === 'grounded' ? 'badge-success' : 'badge-warning'}">
                                ${q.expected_status}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                document.getElementById('loading').classList.add('hidden');
            } catch(err) {
                 document.getElementById('loading').innerHTML = `<p style="color:var(--danger-color)">Error: ${err.message}</p>`;
            }
        });
    </script>
</body>
</html>
